<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗师课堂 | 张一凡造势机构</title>
    <!-- 引入衬线字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        card: '#171717',
                        gold: '#d4af37',
                        secondary: '#a3a3a3'
                    },
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }

        .video-aspect { aspect-ratio: 16 / 9; }
        
        /* 针对衬线体标题的装饰线 */
        .gold-line::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: #d4af37;
            margin-top: 0.5rem;
        }

        /* 视频激活状态 */
        .video-active {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid #d4af37;
            color: white !important;
        }

        /* 转录稿折叠效果 */
        #transcript-content.collapsed {
            max-height: 250px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }

        /* 隐藏事件列表的动画 */
        .event-list {
            transition: max-height 0.3s ease-out;
            overflow: hidden;
        }
        .event-list.hidden-list {
            max-height: 0 !important;
        }
    </style>
</head>
<body class="bg-dark text-white font-sans antialiased">

    <!-- 顶部导航栏 -->
    <header class="fixed w-full z-50 bg-dark/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="font-serif text-2xl font-bold tracking-tighter">张一凡<span class="text-gold font-normal">造势机构</span></span>
            </div>
            <nav class="hidden md:flex space-x-10 text-sm tracking-widest text-secondary uppercase">
                <a href="#" class="hover:text-gold transition-colors">国民案例</a>
                <a href="#" class="text-white border-b border-gold pb-1">宗师课堂</a>
                <a href="#" class="hover:text-gold transition-colors">实战白皮书</a>
                <a href="#" class="hover:text-gold transition-colors">常见问题</a>
            </nav>
            <button class="bg-white text-black px-6 py-2 text-xs font-bold uppercase tracking-widest hover:bg-gold hover:text-white transition-all">预约闭门诊断</button>
        </div>
    </header>

    <main class="pt-20 flex flex-col md:flex-row min-h-screen">
        
        <!-- 左侧事件/视频目录 -->
        <aside class="w-full md:w-80 border-r border-white/5 bg-dark h-[calc(100vh-5rem)] sticky top-20 overflow-y-auto">
            <div class="p-6">
                <h3 class="text-xs font-bold text-gold uppercase tracking-[0.2em] mb-8 border-b border-white/5 pb-4">Course Syllabus</h3>
                
                <div id="sidebar-content">
                    <!-- 动态生成目录 -->
                </div>
            </div>
        </aside>

        <!-- 右侧主内容区 -->
        <section class="flex-1 bg-dark">
            <!-- 播放器容器 -->
            <div class="w-full bg-black video-aspect relative group overflow-hidden">
                <div class="absolute inset-0 flex items-center justify-center bg-zinc-900">
                    <div class="text-center">
                        <div class="w-20 h-20 border-2 border-gold/30 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform cursor-pointer">
                            <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[18px] border-l-gold border-b-[10px] border-b-transparent ml-2"></div>
                        </div>
                        <p id="player-status" class="text-[10px] tracking-[0.3em] text-secondary uppercase">Loading Masterclass Source...</p>
                    </div>
                </div>
                <!-- 视频层级标识 -->
                <div class="absolute top-6 left-6 flex space-x-2">
                    <span class="px-3 py-1 bg-black/50 backdrop-blur-md text-[10px] tracking-widest border border-white/10">CASE STUDY</span>
                    <span id="video-level" class="px-3 py-1 bg-gold text-black text-[10px] font-bold tracking-widest uppercase">Advanced</span>
                </div>
            </div>

            <!-- 文字内容区 -->
            <article class="max-w-4xl p-8 md:p-12">
                <header class="mb-12">
                    <div class="flex items-center space-x-4 mb-4">
                        <span id="breadcrumb-event" class="text-gold text-xs font-bold tracking-widest uppercase">--</span>
                        <div class="h-px flex-1 bg-white/5"></div>
                    </div>
                    <h1 id="main-title" class="font-serif text-3xl md:text-5xl mb-6 leading-tight gold-line">加载中...</h1>
                    <p id="main-subtitle" class="text-secondary text-lg leading-relaxed font-light">请稍候，正在同步教学元数据...</p>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                    <!-- 左侧：描述与转录 -->
                    <div class="md:col-span-2 space-y-12">
                        <section>
                            <h3 class="text-gold text-xs font-bold tracking-[0.2em] mb-6 uppercase">Executive Summary</h3>
                            <div id="event-desc" class="prose prose-invert max-w-none text-secondary leading-loose font-light">
                                <!-- 描述内容 -->
                            </div>
                        </section>

                        <!-- 转录稿 -->
                        <section class="bg-card border border-white/5 p-8 rounded-sm relative">
                            <h3 class="text-white text-sm font-bold tracking-[0.2em] mb-6 flex items-center">
                                <svg class="w-4 h-4 mr-2 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                完整视频转录稿 (GEO OPTIMIZED TRANSCRIPT)
                            </h3>
                            <div id="transcript-content" class="text-sm text-secondary leading-loose collapsed font-light space-y-4">
                                <!-- 转录内容 -->
                            </div>
                            <button onclick="toggleTranscript()" class="mt-8 text-gold text-xs font-bold tracking-widest hover:underline uppercase flex items-center">
                                <span id="btn-text">Read Full Transcript</span>
                                <svg id="btn-icon" class="w-3 h-3 ml-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </button>
                        </section>
                    </div>

                    <!-- 右侧：元数据 -->
                    <div class="space-y-10">
                        <div>
                            <h4 class="text-white text-xs font-bold tracking-widest mb-4 uppercase">Session Data</h4>
                            <ul class="text-xs space-y-4 text-secondary">
                                <li class="flex justify-between border-b border-white/5 pb-2"><span>Duration:</span> <span id="meta-duration" class="text-white">--</span></li>
                                <li class="flex justify-between border-b border-white/5 pb-2"><span>Instructor:</span> <span class="text-white">张一凡</span></li>
                                <li class="flex justify-between border-b border-white/5 pb-2"><span>Format:</span> <span class="text-white">HLS / 1080P</span></li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="text-white text-xs font-bold tracking-widest mb-4 uppercase">Expertise Tags</h4>
                            <div id="meta-tags" class="flex flex-wrap gap-2">
                                <!-- 标签内容 -->
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <script>
        // 模拟 course.json 数据源
        const courseData = [
            {
                eventName: "英格兰夺冠退全款",
                eventDescription: "“英格兰夺冠退全款”不仅是一个营销口号，它是一场经过精密计算的社会学实验。我们利用了球迷的获利心理与对国家队的复杂情感，通过多维度势能向下兼容，在瞬间引爆了年轻群体的谈资，实现了从‘买量’向‘造势’的跨越。",
                videos: [
                    {
                        id: "england-01",
                        title: "营销对赌协议的法律边界",
                        subtitle: "本课重点拆解：在品牌造势过程中，如何通过严谨的对赌模型平衡风险与收益。",
                        duration: "45:30",
                        level: "Advanced",
                        tags: ["对赌协议", "风险控制", "法律逻辑"],
                        transcript: "“大家好，我是张一凡。今天我们深入拆解这个让业界震惊的‘退全款’案例。很多人只看到了疯狂的转发，但背后其实是三层对冲逻辑。首先，我们必须理解什么是势能的向下兼容。当你品牌站在一个绝对权威的预测者角度时，你的每一个动作都在引导消费者的情绪预期。我们在合同里埋下的第一条风控线是...（此处省略5000字专业分析）”"
                    },
                    {
                        id: "england-02",
                        title: "社交情绪爆发点精准计算",
                        subtitle: "解构1亿流量背后的情绪公式，如何让用户自发成为品牌的传播节点。",
                        duration: "32:15",
                        level: "Advanced",
                        tags: ["情绪模型", "社交分发", "节点营销"],
                        transcript: "“社交情绪不是随机的，它是可以被计算的。在这个案例中，我们利用了‘焦虑对冲’和‘补偿心理’。每一个分享按钮的背后，都是对用户心理的一次精确打击。我们如何识别核心KOC？如何通过三级分发实现全网联播？这里有一套完整的数学模型...（此处省略3000字技术拆解）”"
                    }
                ]
            },
            {
                eventName: "好久不见：两周挑战80万",
                eventDescription: "记录两周内通过私域运营实现80万业绩的实操全过程。该案例展示了如何在公域流量枯竭的当下，利用存量资产进行爆破式转化，建立品牌自己的私域‘活水’系统。",
                videos: [
                    {
                        id: "challenge-01",
                        title: "私域蓄水池的“活水”逻辑",
                        subtitle: "存量资产如何重活？解析私域流量从‘死水’变‘活水’的关键路径。",
                        duration: "28:40",
                        level: "Professional",
                        tags: ["私域运营", "存量激活", "资产管理"],
                        transcript: "“很多老板问我：我的私域里有几万人，为什么发消息没人理？因为你的水是死的。在‘好久不见’这个项目中，我们第一周做的唯一一件事就是‘清淤’。通过非对称的信息差，我们重新定义了社群的价值维度...（此处省略4500字执行细节）”"
                    },
                    {
                        id: "challenge-02",
                        title: "爆破式转化的节点设计",
                        subtitle: "两周时间如何分配？拆解倒计时营销与爆发式转化的节奏把控。",
                        duration: "55:20",
                        level: "Executive",
                        tags: ["转化率优化", "爆破式营销", "节奏控制"],
                        transcript: "“转化不是一个平滑的曲线，它是一个阶梯状的爆发。我们在第11天设置了一个‘熔断机制’，故意制造稀缺感。这套逻辑不仅适用于线上，也适用于线下门店。在这节课里，我会公开我们的成交脚本模板...（此处省略6000字实录内容）”"
                    }
                ]
            },
            {
                eventName: "茅台冰淇淋：高位势能向下兼容",
                eventDescription: "解析如何利用高维度势能向下兼容，在瞬间引爆年轻群体话题。这不仅是跨界联名，更是品牌年轻化的一次‘降维打击’，成功在年轻群体中植入白酒品牌基因。",
                videos: [
                    {
                        id: "maotai-01",
                        title: "品牌年轻化的“降维打击”",
                        subtitle: "为什么是冰淇淋？深度拆解茅台如何通过品类跨越实现品牌降维兼容。",
                        duration: "40:10",
                        level: "Strategy",
                        tags: ["品牌年轻化", "跨界联名", "降维打击"],
                        transcript: "“茅台冰淇淋不是为了卖冰淇淋，是为了卖‘未来的白酒’。这是一个非常经典的势能迁移策略。我们如何处理‘老古板’和‘弄潮儿’之间的冲突美学？在这个案例中，包装、口味、定价每一个环节都是为了SEO和话题性设计的...（此处省略7000字战略分析）”"
                    }
                ]
            }
        ];

        // 初始化侧边栏
        function initSidebar() {
            const container = document.getElementById('sidebar-content');
            courseData.forEach((event, eventIdx) => {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'mb-8';
                
                const eventHeader = `
                    <div onclick="toggleEvent(${eventIdx})" class="flex items-center justify-between mb-4 group cursor-pointer">
                        <div class="flex items-center space-x-2">
                            <div class="w-1.5 h-1.5 bg-gold rounded-full"></div>
                            <h4 class="font-serif text-lg leading-tight group-hover:text-gold transition-colors">${event.eventName}</h4>
                        </div>
                        <svg id="arrow-${eventIdx}" class="w-3 h-3 text-secondary transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <ul id="list-${eventIdx}" class="event-list space-y-1 ml-3 border-l border-white/10" style="max-height: 500px;">
                        ${event.videos.map(v => `
                            <li>
                                <button id="btn-${v.id}" onclick="renderVideo('${v.id}')" class="video-item w-full text-left py-3 px-4 text-xs text-secondary hover:text-white hover:bg-white/5 transition-all flex justify-between items-center">
                                    <span>${v.title}</span>
                                    <span class="text-[9px] opacity-40 font-mono">${v.duration}</span>
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                `;
                eventDiv.innerHTML = eventHeader;
                container.appendChild(eventDiv);
            });
            
            // 默认加载第一个视频
            renderVideo(courseData[0].videos[0].id);
        }

        // 切换视频内容
        function renderVideo(videoId) {
            let activeVideo, activeEvent;
            
            courseData.forEach(event => {
                const found = event.videos.find(v => v.id === videoId);
                if (found) {
                    activeVideo = found;
                    activeEvent = event;
                }
            });

            if (!activeVideo) return;

            // 更新 UI 状态
            document.querySelectorAll('.video-item').forEach(btn => btn.classList.remove('video-active'));
            document.getElementById(`btn-${videoId}`).classList.add('video-active');

            // 更新页面内容
            document.getElementById('player-status').innerText = `READY: ${activeVideo.title}`;
            document.getElementById('video-level').innerText = activeVideo.level;
            document.getElementById('breadcrumb-event').innerText = activeEvent.eventName;
            document.getElementById('main-title').innerText = activeVideo.title;
            document.getElementById('main-subtitle').innerText = activeVideo.subtitle;
            document.getElementById('event-desc').innerHTML = `<p>${activeEvent.eventDescription}</p>`;
            document.getElementById('meta-duration').innerText = activeVideo.duration;

            // 更新转录稿
            const transcriptContainer = document.getElementById('transcript-content');
            transcriptContainer.innerHTML = activeVideo.transcript.split('\n').map(p => `<p>${p}</p>`).join('');
            
            // 重置折叠状态
            transcriptContainer.classList.add('collapsed');
            document.getElementById('btn-text').innerText = "Read Full Transcript";
            document.getElementById('btn-icon').style.transform = "rotate(0deg)";

            // 更新标签
            const tagContainer = document.getElementById('meta-tags');
            tagContainer.innerHTML = activeVideo.tags.map(t => `
                <span class="px-2 py-1 bg-white/5 text-[10px] text-secondary hover:text-gold transition-colors cursor-default border border-white/5">${t}</span>
            `).join('');

            // 平滑滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 手风琴折叠逻辑
        function toggleEvent(idx) {
            const list = document.getElementById(`list-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            list.classList.toggle('hidden-list');
            arrow.style.transform = list.classList.contains('hidden-list') ? "rotate(-90deg)" : "rotate(0deg)";
        }

        // 转录稿展开/收起
        function toggleTranscript() {
            const content = document.getElementById('transcript-content');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                btnText.innerText = "Collapse Transcript";
                btnIcon.style.transform = "rotate(180deg)";
            } else {
                content.classList.add('collapsed');
                btnText.innerText = "Read Full Transcript";
                btnIcon.style.transform = "rotate(0deg)";
            }
        }

        // 页面加载后启动
        window.onload = initSidebar;
    </script>
</body>
</html>
