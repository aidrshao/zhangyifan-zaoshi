services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zhangyifan-app-dev
    ports:
      - "3009:3000"
    environment:
      - NODE_ENV=development
      - POSTGRES_URL=postgres://postgres:${POSTGRES_PASSWORD:-zhangyifan2024}@db:5432/${POSTGRES_DATABASE:-zhangyifan}
      - POSTGRES_PRISMA_URL=postgres://postgres:${POSTGRES_PASSWORD:-zhangyifan2024}@db:5432/${POSTGRES_DATABASE:-zhangyifan}?pgbouncer=true
      - POSTGRES_URL_NON_POOLING=postgres://postgres:${POSTGRES_PASSWORD:-zhangyifan2024}@db:5432/${POSTGRES_DATABASE:-zhangyifan}
      - POSTGRES_USER=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zhangyifan2024}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-zhangyifan}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-zhangyifan2024}
      - WATCHPACK_POLLING=true
    volumes:
      - ./src:/app/src:delegated
      - ./data:/app/data:delegated
      - ./public:/app/public:delegated
      - ./next.config.ts:/app/next.config.ts:delegated
      - ./tailwind.config.ts:/app/tailwind.config.ts:delegated
      - ./postcss.config.mjs:/app/postcss.config.mjs:delegated
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zhangyifan-network

  db:
    image: postgres:15-alpine
    container_name: zhangyifan-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zhangyifan2024}
      - POSTGRES_DB=${POSTGRES_DATABASE:-zhangyifan}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/lib/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - zhangyifan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DATABASE:-zhangyifan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  zhangyifan-network:
    driver: bridge

volumes:
  postgres-data:
